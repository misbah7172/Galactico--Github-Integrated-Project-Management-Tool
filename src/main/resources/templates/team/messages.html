<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Chat - Galactico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        :root {
            --midnight-blue: #0f172a;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-600: #475569;
            --neon-cyan: #06b6d4;
            --indigo: #6366f1;
            --soft-violet: #8b5cf6;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --card-bg: rgba(30, 41, 59, 0.8);
            --border-color: rgba(99, 102, 241, 0.2);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', sans-serif !important;
            background: linear-gradient(135deg, var(--midnight-blue) 0%, #1a202c 50%, var(--slate-800) 100%) !important;
            color: var(--text-primary) !important;
            min-height: 100vh !important;
            line-height: 1.6 !important;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
            min-height: 600px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .page-header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            gap: 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .page-description {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(30, 41, 59, 1);
            border-color: var(--indigo);
        }

        .chat-container {
            flex: 1 !important;
            display: flex !important;
            flex-direction: column !important;
            background: var(--card-bg) !important;
            backdrop-filter: blur(20px) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 16px !important;
            overflow: hidden !important;
            position: relative !important;
            min-height: 70vh !important;
            height: 100% !important;
        }

        .chat-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--indigo), var(--soft-violet));
            z-index: 1;
        }

        .chat-messages {
            flex: 1 !important;
            overflow-y: auto !important;
            padding: 1.5rem !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 1rem !important;
            min-height: 400px !important;
            height: 100% !important;
            background: transparent !important;
            scrollbar-width: thin !important;
            scrollbar-color: var(--indigo) transparent !important;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--indigo);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--soft-violet);
        }

        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: 1rem;
        }

        .message-other {
            align-items: flex-start;
        }

        .message-own {
            align-items: flex-end;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .message-own .message-header {
            flex-direction: row-reverse;
        }

        .message-author {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .author-avatar,
        .author-avatar-placeholder {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--slate-700);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.8rem;
            border: 2px solid var(--border-color);
        }

        .author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-name {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .message-content-wrapper {
            max-width: 70%;
            min-width: 200px;
        }

        .message-content {
            padding: 1rem 1.25rem;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message-own .message-content {
            background: linear-gradient(135deg, var(--indigo), var(--soft-violet));
            color: white;
        }

        .message-reactions {
            margin-top: 0.5rem;
            display: flex;
            gap: 0.25rem;
            flex-wrap: wrap;
        }

        .message-actions {
            margin-top: 0.5rem;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .react-btn,
        .delete-btn {
            background: none;
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }

        .react-btn:hover {
            background: rgba(30, 41, 59, 0.8);
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .no-messages {
            text-align: center !important;
            padding: 4rem 2rem !important;
            color: var(--text-secondary) !important;
            background: transparent !important;
            border-radius: 16px !important;
            margin: 2rem auto !important;
            max-width: 400px !important;
        }

        .no-messages-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--slate-700), var(--slate-600));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--text-secondary);
            font-size: 2rem;
            opacity: 0.8;
        }

        .no-messages h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .no-messages p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .chat-input-container {
            padding: 1.5rem !important;
            border-top: 1px solid var(--border-color) !important;
            background: rgba(15, 23, 42, 0.5) !important;
        }

        .chat-input-form {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .message-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 44px;
            max-height: 120px;
            transition: all 0.3s ease;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--indigo);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn,
        .send-button {
            padding: 0.875rem 1.25rem;
            background: linear-gradient(135deg, var(--indigo), var(--soft-violet));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 500;
            min-width: 52px;
            height: 44px;
        }

        .send-btn:hover,
        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .send-btn:disabled,
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
                height: calc(100vh - 80px);
                min-height: 500px;
            }

            .page-header {
                flex-direction: column;
                gap: 1rem;
                margin-bottom: 1rem;
            }

            .page-header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .message-content-wrapper {
                max-width: 85%;
            }

            .chat-container {
                min-height: 60vh !important;
            }

            .chat-messages {
                min-height: 300px !important;
                padding: 1rem !important;
            }

            .chat-input-form {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">
                        <i class="fas fa-comments"></i> Team Chat
                    </h1>
                    <p class="page-description">Collaborate and communicate with your team members</p>
                </div>
                <a th:href="@{/teams/{id}(id=${teamId})}" class="btn btn-secondary">
                    <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5m0 0l7 7m-7-7l7-7"/>
                    </svg>
                    Back to Team
                </a>
            </div>
        </div>

        <div class="chat-container">
            <!-- Messages Area -->
            <div class="chat-messages" id="chatMessages">                <div th:if="${messages} and not ${#lists.isEmpty(messages)}">
                    <div class="message" th:each="message : ${messages}" 
                         th:classappend="${message.sender.id == currentUser.id} ? 'message-own' : 'message-other'"
                         th:data-message-id="${message.id}">
                        <div class="message-header">
                            <div class="message-author">
                                <img th:if="${message.sender.avatarUrl}" 
                                     th:src="${message.sender.avatarUrl}" 
                                     th:alt="${message.sender.nickname}"
                                     class="author-avatar">
                                <div th:unless="${message.sender.avatarUrl}" 
                                     class="author-avatar-placeholder"
                                     th:text="${#strings.substring(message.sender.nickname, 0, 1).toUpperCase()}">M</div>
                                <span class="author-name" th:text="${message.sender.nickname}">Misbah</span>
                            </div>
                            <div class="message-time" th:text="${#temporals.format(message.createdAt, 'MMM dd, yyyy HH:mm')}">Sep 20, 2025 14:30</div>
                        </div>                        <div class="message-content-wrapper">
                            <div class="message-content" th:text="${message.content}">Hello team!</div>
                            <!-- Reactions display will be added by JavaScript -->
                            <div class="message-reactions" th:data-message-id="${message.id}"></div>                            <div class="message-actions">
                                <button class="react-btn" 
                                        onclick="toggleReactionPicker(this.getAttribute('data-message-id'))"
                                        th:attr="data-message-id=${message.id}">😀</button>
                                <button th:if="${message.sender.id == currentUser.id}" 
                                        class="delete-btn" 
                                        onclick="deleteMessage(this.getAttribute('data-message-id'))"
                                        th:attr="data-message-id=${message.id}">🗑️</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div th:if="${messages} == null or ${#lists.isEmpty(messages)}" class="no-messages">
                    <div class="no-messages-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <h3>No messages yet</h3>
                    <p>Start the conversation by sending the first message!</p>
                </div>
            </div>

            <!-- Message Input -->
            <div class="chat-input-container">
                <form id="messageForm" class="chat-input-form">
                    <div class="input-group">
                        <textarea id="messageContent" 
                                  placeholder="Type your message..." 
                                  rows="2" 
                                  required
                                  class="message-input"></textarea>
                        <button type="submit" class="send-button" id="sendButton">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22,2 15,22 11,13 2,9"></polygon>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        const teamId = [[${teamId}]];
        const currentUserId = [[${currentUser.id}]];
        
        // Auto-scroll to bottom
        function scrollToBottom() {
            const chatMessages = document.getElementById('chatMessages');
            if (chatMessages) {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }
        
        // Resize chat container properly
        function resizeChatContainer() {
            const chatContainer = document.querySelector('.chat-container');
            const container = document.querySelector('.container');
            const pageHeader = document.querySelector('.page-header');
            
            if (chatContainer && container && pageHeader) {
                const containerHeight = container.offsetHeight;
                const headerHeight = pageHeader.offsetHeight;
                const availableHeight = containerHeight - headerHeight - 32; // 32px for margins
                
                chatContainer.style.height = availableHeight + 'px';
                chatContainer.style.minHeight = Math.max(availableHeight, 400) + 'px';
            }
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            resizeChatContainer();
            scrollToBottom();
        });
        
        // Resize on window resize
        window.addEventListener('resize', resizeChatContainer);
        
        // Initial calls
        setTimeout(() => {
            resizeChatContainer();
            scrollToBottom();
        }, 100);
          // Send message
        document.getElementById('messageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const content = document.getElementById('messageContent').value.trim();
            if (!content) return;
            
            const sendButton = document.getElementById('sendButton');
            sendButton.disabled = true;
              fetch(`/teams/${teamId}/messages/send`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    [csrfHeader]: csrfToken
                },
                body: new URLSearchParams({
                    content: content
                })
            })            .then(response => {
                if (response.ok) {
                    // Clear message first, then reload
                    document.getElementById('messageContent').value = '';
                    loadRecentMessages();
                    return response.text(); // Changed from json() to text()
                } else {
                    // Error response
                    return response.text().then(text => {
                        throw new Error(text);
                    });
                }
            })
            .then(result => {
                // Message sent successfully, already cleared input and reloaded
                console.log('Message sent successfully:', result);
            })
            .catch(error => {
                console.error('Error sending message:', error);
                alert('Failed to send message: ' + error.message);
            })
            .finally(() => {
                sendButton.disabled = false;
            });
        });
        
        // Enter key to send (Shift+Enter for new line)
        document.getElementById('messageContent').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('messageForm').dispatchEvent(new Event('submit'));
            }
        });
          // Load recent messages
        function loadRecentMessages() {
            fetch(`/teams/${teamId}/messages/recent`, {
                headers: {
                    [csrfHeader]: csrfToken
                }
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    throw new Error('Failed to load messages');
                }
            })
            .then(messages => {
                displayMessages(messages);
                scrollToBottom();
            })
            .catch(error => {
                console.error('Error loading messages:', error);
                // Don't show alert for background refresh errors
            });        }
          // Render reactions for a message
        function renderReactions(messageId, reactions) {
            const reactionsContainer = document.querySelector(`[data-message-id="${messageId}"] .message-reactions`);
            if (!reactionsContainer) return;
            
            reactionsContainer.innerHTML = '';
            
            Object.entries(reactions).forEach(([emoji, users]) => {
                if (users.length > 0) {
                    const userReacted = users.some(user => user.id === currentUserId);
                    const reactionItem = document.createElement('div');
                    reactionItem.className = `reaction-item ${userReacted ? 'user-reacted' : ''}`;
                    reactionItem.onclick = () => addReaction(messageId, emoji);
                    
                    reactionItem.innerHTML = `
                        <span class="reaction-emoji">${emoji}</span>
                        <span class="reaction-count">${users.length}</span>
                    `;
                    
                    reactionsContainer.appendChild(reactionItem);
                }
            });
        }
          // Display messages
        function displayMessages(messages) {
            const chatMessages = document.getElementById('chatMessages');
            
            if (messages.length === 0) {
                chatMessages.innerHTML = `
                    <div class="no-messages">
                        <div class="no-messages-icon">💬</div>
                        <h3>No messages yet</h3>
                        <p>Start the conversation by sending the first message!</p>
                    </div>
                `;
                return;
            }
            
            chatMessages.innerHTML = messages.reverse().map(message => {
                const isOwn = message.sender.id === currentUserId;
                const messageClass = isOwn ? 'message message-own' : 'message message-other';
                
                return `
                    <div class="${messageClass}" data-message-id="${message.id}">
                        <div class="message-header">
                            <div class="message-author">
                                ${message.sender.avatarUrl ? 
                                    `<img src="${message.sender.avatarUrl}" alt="${message.sender.nickname}" class="author-avatar">` :
                                    `<div class="author-avatar-placeholder">${message.sender.nickname.charAt(0).toUpperCase()}</div>`
                                }
                                <span class="author-name">${message.sender.nickname}</span>
                            </div>
                            <div class="message-time">${new Date(message.createdAt).toLocaleString()}</div>
                        </div>                        <div class="message-content-wrapper">
                            <div class="message-content">${message.content}</div>
                            <div class="message-reactions" data-message-id="${message.id}"></div>
                            <div class="message-actions">
                                <button class="react-btn" onclick="toggleReactionPicker(${message.id})">😀</button>
                                ${isOwn ? `<button class="delete-btn" onclick="deleteMessage(${message.id})">🗑️</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;            }).join('');
            
            // Render reactions for each message
            messages.forEach(message => {
                if (message.reactions && Object.keys(message.reactions).length > 0) {
                    renderReactions(message.id, message.reactions);
                }
            });
        }
        // Auto-refresh messages every 5 seconds
        setInterval(loadRecentMessages, 5000);
          // Delete message function
        function deleteMessage(messageId) {
            console.log('Deleting message:', messageId);
            
            if (!confirm('Are you sure you want to delete this message?')) {
                return;
            }
            
            fetch(`/teams/${teamId}/messages/${messageId}/delete`, {
                method: 'DELETE',
                headers: {
                    [csrfHeader]: csrfToken
                }
            })
            .then(response => {
                console.log('Delete response status:', response.status);
                if (response.ok) {
                    loadRecentMessages(); // Refresh messages
                } else {
                    return response.text().then(text => {
                        console.error('Delete failed:', text);
                        alert('Failed to delete message: ' + text);
                    });
                }
            })
            .catch(error => {
                console.error('Error deleting message:', error);
                alert('Failed to delete message');
            });
        }
          // React to message function
        function toggleReactionPicker(messageId) {
            console.log('Toggle reaction picker for message:', messageId);
            
            const existingPicker = document.querySelector('.reaction-picker');
            if (existingPicker) {
                existingPicker.remove();
                return;
            }
            
            const messageElement = document.querySelector(`[data-message-id="${messageId}"]`);
            if (!messageElement) {
                console.error('Message element not found for ID:', messageId);
                return;
            }
            
            const picker = document.createElement('div');
            picker.className = 'reaction-picker';
            picker.innerHTML = `
                <div class="reaction-options">
                    <button onclick="addReaction(${messageId}, '👍')">👍</button>
                    <button onclick="addReaction(${messageId}, '❤️')">❤️</button>
                    <button onclick="addReaction(${messageId}, '😂')">😂</button>
                    <button onclick="addReaction(${messageId}, '😮')">😮</button>
                    <button onclick="addReaction(${messageId}, '😢')">😢</button>
                    <button onclick="addReaction(${messageId}, '😡')">😡</button>
                </div>
            `;
            
            messageElement.appendChild(picker);
            
            // Close picker when clicking outside
            setTimeout(() => {
                document.addEventListener('click', function closePickerHandler(e) {
                    if (!picker.contains(e.target)) {
                        picker.remove();
                        document.removeEventListener('click', closePickerHandler);
                    }
                });
            }, 100);
        }
          // Add reaction to message
        function addReaction(messageId, emoji) {
            console.log('Adding reaction:', emoji, 'to message:', messageId);
            
            fetch(`/teams/${teamId}/messages/${messageId}/react`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    [csrfHeader]: csrfToken
                },
                body: new URLSearchParams({
                    emoji: emoji
                })
            })
            .then(response => {
                console.log('Reaction response status:', response.status);
                if (response.ok) {
                    // Remove picker
                    const picker = document.querySelector('.reaction-picker');
                    if (picker) picker.remove();
                    
                    // Refresh messages to show new reaction
                    loadRecentMessages();
                } else {
                    return response.text().then(text => {
                        console.error('Reaction failed:', text);
                        alert('Failed to add reaction: ' + text);
                    });
                }
            })
            .catch(error => {
                console.error('Error adding reaction:', error);
                alert('Failed to add reaction');
            });
        }
    </script>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
