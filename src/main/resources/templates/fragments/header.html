<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <header th:fragment="header" class="galactico-header">
        <div class="header-inner">
            <!-- Logo -->
            <a th:href="@{/}" class="header-logo">
                <svg width="32" height="32" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
                    <line x1="400" y1="160" x2="200" y2="520" stroke="#06b6d4" stroke-width="60"/>
                    <line x1="400" y1="160" x2="600" y2="520" stroke="#06b6d4" stroke-width="60"/>
                    <line x1="230" y1="520" x2="570" y2="520" stroke="#06b6d4" stroke-width="60"/>
                    <rect x="320" y="80" width="160" height="160" rx="40" ry="40" fill="#6366f1"/>
                    <rect x="120" y="480" width="160" height="160" rx="40" ry="40" fill="#8b5cf6"/>
                    <rect x="520" y="480" width="160" height="160" rx="40" ry="40" fill="#06b6d4"/>
                </svg>
                Galactico
            </a>

            <!-- Mobile hamburger button -->
            <button sec:authorize="isAuthenticated()" class="mobile-menu-btn" onclick="document.getElementById('nav-menu').classList.toggle('nav-open')" aria-label="Toggle menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <!-- Navigation -->
            <nav id="nav-menu" sec:authorize="isAuthenticated()" class="header-nav">
                <a th:href="@{/dashboard}" class="nav-link" th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/dashboard') ? ' nav-active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Dashboard
                </a>
                <a th:href="@{/teams}" class="nav-link" th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/teams') ? ' nav-active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Teams
                </a>
                <a th:href="@{/projects}" class="nav-link" th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/projects') ? ' nav-active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                    Projects
                </a>
                <a th:href="@{/tasks/assigned}" class="nav-link" th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/tasks') ? ' nav-active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                    Tasks
                </a>
                <a th:href="@{/commit-review}" class="nav-link" th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/commit-review') ? ' nav-active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                    Review
                </a>
                <a th:href="@{/notifications}" class="nav-link" th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/notifications') ? ' nav-active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    Notifications
                    <span id="notifications-badge" class="notif-badge">0</span>
                </a>
            </nav>

            <!-- User section -->
            <div sec:authorize="isAuthenticated()" class="header-user">
                <a th:href="@{/profile}" class="user-avatar-link">
                    <img th:src="${#authentication.principal.attributes['avatar_url']}" 
                         class="user-avatar"
                         alt="User Avatar"
                         onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTYiIGZpbGw9IiNGM0Y0RjYiLz4KPGNpcmNsZSBjeD0iMTYiIGN5PSIxMiIgcj0iNSIgZmlsbD0iIzlDQTNBRiIvPgo8cGF0aCBkPSJNMjYgMjZWMjNBNCA0IDAgMCAwIDIyIDE5SDEwQTQgNCAwIDAgMCA2IDIzVjI2IiBmaWxsPSIjOUNBM0FGIi8+Cjwvc3ZnPgo='"
                    />
                </a>
                <div class="user-info">
                    <div class="user-name" th:text="${#authentication.principal.attributes['login']}">Username</div>
                    <div class="user-role" sec:authorize="hasAuthority('TEAM_LEAD')">Team Lead</div>
                    <div class="user-role" sec:authorize="hasAuthority('MEMBER')">Member</div>
                </div>
                <form th:action="@{/logout}" method="post" class="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="logout-btn" title="Sign out">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        <span class="logout-text">Logout</span>
                    </button>
                </form>
            </div>

            <!-- Anonymous login -->
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="login-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    Login with GitHub
                </a>
            </div>
        </div>
    </header>

    <style>
        .galactico-header {
            background: rgba(15, 23, 42, 0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            gap: 1rem;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: #f8fafc;
            font-weight: 700;
            font-size: 1.35rem;
            flex-shrink: 0;
        }
        .header-nav {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.45rem 0.85rem;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
            position: relative;
            white-space: nowrap;
        }
        .nav-link:hover {
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.08);
        }
        .nav-link.nav-active {
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.12);
        }
        .notif-badge {
            display: none;
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: #fff;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            font-size: 0.7rem;
            font-weight: 700;
            text-align: center;
            line-height: 18px;
            padding: 0 4px;
        }
        .header-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }
        .user-avatar-link { display: flex; }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(99, 102, 241, 0.3);
            transition: border-color 0.2s;
        }
        .user-avatar:hover { border-color: #06b6d4; }
        .user-info { display: flex; flex-direction: column; }
        .user-name { color: #f8fafc; font-weight: 600; font-size: 0.85rem; line-height: 1.2; }
        .user-role { color: #94a3b8; font-size: 0.75rem; line-height: 1.2; }
        .logout-form { margin: 0; }
        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.75rem;
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        .logout-btn:hover { border-color: #ef4444; color: #ef4444; }
        .login-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1.25rem;
            background: linear-gradient(135deg, #06b6d4, #6366f1);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.875rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(6, 182, 212, 0.4); }
        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #94a3b8;
            border-radius: 8px;
            padding: 0.4rem;
            cursor: pointer;
        }
        @media (max-width: 900px) {
            .mobile-menu-btn { display: flex; }
            .header-nav {
                display: none;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background: rgba(15, 23, 42, 0.98);
                backdrop-filter: blur(12px);
                flex-direction: column;
                padding: 0.75rem;
                border-bottom: 1px solid rgba(99, 102, 241, 0.15);
                gap: 0.25rem;
            }
            .header-nav.nav-open { display: flex; }
            .nav-link { width: 100%; padding: 0.65rem 1rem; }
            .user-info { display: none; }
            .logout-text { display: none; }
        }
    </style>

    <script sec:authorize="isAuthenticated()">
        document.addEventListener('DOMContentLoaded', function() {
            loadNotificationCount();
            setInterval(loadNotificationCount, 30000);
        });
        async function loadNotificationCount() {
            try {
                const csrfMeta = document.querySelector('meta[name="_csrf"]');
                const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
                const headers = {};
                if (csrfMeta && csrfHeaderMeta) {
                    headers[csrfHeaderMeta.getAttribute('content')] = csrfMeta.getAttribute('content');
                }
                const resp = await fetch('/team-invitations/pending/count', { headers });
                if (!resp.ok) return;
                const count = await resp.json();
                const badge = document.getElementById('notifications-badge');
                if (badge) {
                    if (count > 0) {
                        badge.textContent = count;
                        badge.style.display = 'inline-block';
                    } else {
                        badge.style.display = 'none';
                    }
                }
            } catch (e) {
                console.warn('Notification count error:', e.message);
            }
        }
    </script>
</body>
</html>
