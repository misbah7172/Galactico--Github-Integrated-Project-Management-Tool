version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: galactico-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-galactico}
      POSTGRES_USER: ${DB_USERNAME:-galactico}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-galactico_secret}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-galactico} -d ${DB_NAME:-galactico}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  autotrack-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autotrack-app
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Database configuration (local PostgreSQL container)
      - DB_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-galactico}
      - DB_USERNAME=${DB_USERNAME:-galactico}
      - DB_PASSWORD=${DB_PASSWORD:-galactico_secret}
      # GitHub OAuth configuration
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_EXTENSION_CLIENT_ID=${GITHUB_EXTENSION_CLIENT_ID}
      - GITHUB_EXTENSION_CLIENT_SECRET=${GITHUB_EXTENSION_CLIENT_SECRET}
      # OAuth redirect URI
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI:-http://localhost:5000/login/oauth2/code/github}
      - OAUTH_EXTENSION_REDIRECT_URI=${OAUTH_EXTENSION_REDIRECT_URI:-vscode://publisher.autotrack}
      # Email configuration (optional)
      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-smtp.gmail.com}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-587}
      - SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD}
      # Security configuration
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_here_minimum_32_characters}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your_encryption_key_32_chars_here}
      # Application URL
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:5000}
      - BASE_URL=${BASE_URL:-http://localhost:5000}
      # Server binding - must be 0.0.0.0 for Docker
      - SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    volumes:
      - app-logs:/app/logs

volumes:
  postgres-data:
    driver: local
  app-logs:
    driver: local
